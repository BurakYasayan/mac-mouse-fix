name: Manual Build App

on:
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Xcode and schemes
        run: |
          xcodebuild -version
          xcodebuild -list -project "Mouse Fix.xcodeproj"

      - name: Build Mac Mouse Fix (unsigned)
        id: build_unsigned
        continue-on-error: true
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "Fast Build" \
            -configuration Debug \
            -destination "generic/platform=macOS" \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build/xcodebuild.log

      - name: Print error summary
        if: always()
        run: |
          echo "=== xcodebuild tail (last 200 lines) ==="
          tail -n 200 build/xcodebuild.log || true
          echo "=== extracted error lines ==="
          grep -nE "error:|fatal error|\*\* BUILD FAILED \*\*|PhaseScriptExecution|CodeSign|Provisioning" build/xcodebuild.log | tail -n 200 || true

      - name: Prepare app artifact
        if: always()
        id: pack_app
        run: |
          APP_PATH=$(find build/Build/Products -type d -name "Mac Mouse Fix.app" | head -n 1 || true)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -type d -name "Mac Mouse Fix.app" | head -n 1 || true)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "Mac Mouse Fix.app not found under derived data."
            echo "app_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APP_SIZE_KB=$(du -sk "$APP_PATH" | awk '{print $1}')
          echo "Found app at: $APP_PATH"
          echo "App size (KB): $APP_SIZE_KB"

          if [ "$APP_SIZE_KB" -lt 1000 ]; then
            echo "App bundle is unexpectedly small."
            echo "app_found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p artifact
          ditto "$APP_PATH" "artifact/Mac Mouse Fix.app"
          echo "app_found=true" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        if: steps.pack_app.outputs.app_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Mouse-Fix-unsigned-app
          path: artifact/Mac Mouse Fix.app
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Manual-Build-Logs
          path: build/xcodebuild.log
          retention-days: 7

      - name: Fail only if no app was produced
        if: steps.pack_app.outputs.app_found != 'true'
        run: |
          echo "No app artifact was produced. Download Manual-Build-Logs and inspect xcodebuild.log."
          exit 1

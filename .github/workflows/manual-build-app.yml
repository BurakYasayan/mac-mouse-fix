name: Manual Build App

on:
  workflow_dispatch:

jobs:
  build-app:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Xcode and schemes
        run: |
          xcodebuild -version
          xcodebuild -list -project "Mouse Fix.xcodeproj"

      - name: Build Mac Mouse Fix (unsigned)
        id: build_unsigned
        continue-on-error: true
        run: |
          mkdir -p build
          set -o pipefail
          xcodebuild \
            -project "Mouse Fix.xcodeproj" \
            -scheme "Fast Build" \
            -configuration Debug \
            -destination "generic/platform=macOS" \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee build/xcodebuild.log

      - name: Print error summary
        if: always()
        run: |
          echo "=== xcodebuild tail (last 200 lines) ==="
          tail -n 200 build/xcodebuild.log || true
          echo "=== extracted error lines ==="
          grep -nE "error:|fatal error|\*\* BUILD FAILED \*\*|PhaseScriptExecution|CodeSign|Provisioning" build/xcodebuild.log | tail -n 200 || true

      - name: Stop if build failed
        if: steps.build_unsigned.outcome != 'success'
        run: |
          echo "Build failed. See xcodebuild.log artifact and error summary above."
          exit 1

      - name: Pack app artifact
        if: success()
        run: |
          APP_PATH=$(find build -type d -name "Mac Mouse Fix.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Mac Mouse Fix.app not found under derived data."
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "Mac-Mouse-Fix-unsigned.app.zip"

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Mouse-Fix-unsigned-app
          path: Mac-Mouse-Fix-unsigned.app.zip
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Manual-Build-Logs
          path: build/xcodebuild.log
          retention-days: 7
